<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>跑步分析</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --border: #23272f;
    --accent: #c8f135;
    --accent-dim: rgba(200,241,53,0.1);
    --text: #e8eaf0;
    --muted: #6b7280;
    --red: #ff6b6b;
    --blue: #60a5fa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 32px 24px;
  }

  .header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 32px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
  }

  .header-left h1 {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 400;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .header-left p {
    font-size: 28px;
    font-weight: 600;
    color: var(--text);
  }

  .nav-link {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-decoration: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 14px;
    transition: border-color 0.15s, color 0.15s;
  }

  .nav-link:hover { border-color: var(--accent); color: var(--accent); }

  /* Latest analysis card */
  .latest-card {
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 32px;
  }

  .latest-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }

  .latest-date {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .latest-name {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  .metric-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    text-align: center;
  }

  .metric-box .label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }

  .metric-box .value {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }

  /* Analysis sections */
  .analysis-section {
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .analysis-section:last-child {
    margin-bottom: 0;
    padding-bottom: 0;
    border-bottom: none;
  }

  .analysis-section .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }

  .analysis-section .section-text {
    font-size: 14px;
    line-height: 1.8;
    color: #b0b8c8;
  }

  .analysis-section .section-text p {
    margin-bottom: 6px;
  }

  .analysis-section .section-text p:last-child {
    margin-bottom: 0;
  }

  .overall-rating {
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
    background: var(--accent-dim);
    border-radius: 8px;
    padding: 14px 18px;
    margin-bottom: 20px;
  }

  .suggestions-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .suggestions-list li {
    font-size: 14px;
    line-height: 1.6;
    color: #b0b8c8;
  }

  .suggestions-list li::before {
    content: '→';
    color: var(--accent);
    margin-right: 8px;
    font-family: 'Space Mono', monospace;
  }

  /* History */
  .section-title {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 12px;
  }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .history-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .history-item:hover { border-color: var(--accent); }

  .history-item-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .history-date {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .history-summary {
    font-size: 13px;
    color: var(--text);
    margin-top: 4px;
  }

  .history-detail {
    display: none;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  .history-item.open .history-detail { display: block; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 14px;
  }

  @media (max-width: 700px) {
    .metrics-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Garmin · AI Analysis</h1>
    <p>每次跑步分析</p>
  </div>
  <a href="running_dashboard.html" class="nav-link">← 回主頁</a>
</div>

<div id="content"></div>

<script>
let DATA = { analyses: [] };

async function loadData() {
  try {
    const res = await fetch('analysis.json?t=' + Date.now());
    if (res.ok) {
      DATA = await res.json();
    }
  } catch (e) {
    console.error('無法載入分析數據', e);
  }
  render();
}

function metricBox(label, value) {
  return `<div class="metric-box"><div class="label">${label}</div><div class="value">${value}</div></div>`;
}

function splitIntoParagraphs(text) {
  if (!text) return '';
  const parts = text.split(/；|;/).map(s => s.trim()).filter(Boolean);
  return parts.map(p => `<p>${p}</p>`).join('');
}

function renderLatest(item) {
  const r = item.run;
  const a = item.analysis;

  if (a.raw_text) {
    return `
      <div class="latest-card">
        <div class="latest-label">最新分析</div>
        <div class="latest-date">${item.date}</div>
        <div class="latest-name">${r.name}</div>
        <div class="analysis-section">
          <div class="section-text">${splitIntoParagraphs(a.raw_text)}</div>
        </div>
      </div>`;
  }

  return `
    <div class="latest-card">
      <div class="latest-label">最新分析</div>
      <div class="latest-date">${item.date}</div>
      <div class="latest-name">${r.name}</div>

      <div class="metrics-grid">
        ${metricBox('距離', r.distance_km + ' km')}
        ${metricBox('配速', r.pace)}
        ${metricBox('平均心率', r.avg_hr + ' bpm')}
        ${metricBox('步頻', Math.round(r.avg_cadence) + ' spm')}
        ${metricBox('步幅', Math.round(r.avg_stride_length_m) + ' cm')}
      </div>

      <div class="overall-rating">${a.overall_rating || ''}</div>

      <div class="analysis-section">
        <div class="section-label">步頻分析</div>
        <div class="section-text">${splitIntoParagraphs(a.cadence_analysis)}</div>
      </div>

      <div class="analysis-section">
        <div class="section-label">效率分析</div>
        <div class="section-text">${splitIntoParagraphs(a.efficiency_analysis)}</div>
      </div>

      <div class="analysis-section">
        <div class="section-label">趨勢對比</div>
        <div class="section-text">${splitIntoParagraphs(a.comparison)}</div>
      </div>

      <div class="analysis-section">
        <div class="section-label">改善建議</div>
        <ul class="suggestions-list">
          ${(a.suggestions || []).map(s => `<li>${s}</li>`).join('')}
        </ul>
      </div>
    </div>`;
}

function renderHistoryItem(item, index) {
  const r = item.run;
  const a = item.analysis;

  const detailHtml = a.raw_text
    ? `<div class="section-text">${splitIntoParagraphs(a.raw_text)}</div>`
    : `
      <div class="metrics-grid">
        ${metricBox('距離', r.distance_km + ' km')}
        ${metricBox('配速', r.pace)}
        ${metricBox('平均心率', r.avg_hr + ' bpm')}
        ${metricBox('步頻', Math.round(r.avg_cadence) + ' spm')}
        ${metricBox('步幅', Math.round(r.avg_stride_length_m) + ' cm')}
      </div>
      <div class="overall-rating">${a.overall_rating || ''}</div>
      <div class="analysis-section">
        <div class="section-label">步頻分析</div>
        <div class="section-text">${splitIntoParagraphs(a.cadence_analysis)}</div>
      </div>
      <div class="analysis-section">
        <div class="section-label">效率分析</div>
        <div class="section-text">${splitIntoParagraphs(a.efficiency_analysis)}</div>
      </div>
      <div class="analysis-section">
        <div class="section-label">趨勢對比</div>
        <div class="section-text">${splitIntoParagraphs(a.comparison)}</div>
      </div>
      <div class="analysis-section">
        <div class="section-label">改善建議</div>
        <ul class="suggestions-list">
          ${(a.suggestions || []).map(s => `<li>${s}</li>`).join('')}
        </ul>
      </div>`;

  return `
    <div class="history-item" onclick="toggleHistory(${index})">
      <div class="history-item-header">
        <div>
          <div class="history-date">${item.date}</div>
          <div class="history-summary">${r.distance_km}km · 配速 ${r.pace} · ${a.overall_rating || r.name}</div>
        </div>
        <div class="history-date">▾</div>
      </div>
      <div class="history-detail" id="detail-${index}">
        ${detailHtml}
      </div>
    </div>`;
}

function toggleHistory(index) {
  const item = document.querySelectorAll('.history-item')[index];
  item.classList.toggle('open');
}

function render() {
  const content = document.getElementById('content');

  if (!DATA.analyses || DATA.analyses.length === 0) {
    content.innerHTML = `
      <div class="empty-state">
        還沒有分析紀錄。<br>
        跑完步後，腳本會自動分析並顯示在這裡。
      </div>`;
    return;
  }

  const [latest, ...history] = DATA.analyses;

  let html = renderLatest(latest);

  if (history.length > 0) {
    html += `<div class="section-title" style="margin-top:32px">歷史分析紀錄</div>`;
    html += `<div class="history-list">`;
    html += history.map((item, i) => renderHistoryItem(item, i + 1)).join('');
    html += `</div>`;
  }

  content.innerHTML = html;
}

loadData();
</script>
</body>
</html>

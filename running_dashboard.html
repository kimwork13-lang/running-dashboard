<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>跑步紀錄</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --border: #23272f;
    --accent: #c8f135;
    --accent-dim: rgba(200,241,53,0.1);
    --text: #e8eaf0;
    --muted: #6b7280;
    --red: #ff6b6b;
    --blue: #60a5fa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 32px 24px;
  }

  .header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 40px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
  }

  .header-left h1 {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 400;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .header-left p {
    font-size: 28px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.1;
  }

  .header-right {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: right;
  }

  /* Stats row */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
  }

  .stat-card.highlight {
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  .stat-value {
    font-family: 'Space Mono', monospace;
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }

  .stat-card.highlight .stat-value { color: var(--accent); }

  .stat-unit {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* Charts row */
  .charts {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 28px;
  }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
  }

  .chart-title {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 16px;
  }

  .chart-wrap { position: relative; height: 180px; }

  /* Run list */
  .section-title {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 12px;
  }

  .run-list { display: flex; flex-direction: column; gap: 8px; }

  .run-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    display: grid;
    grid-template-columns: 90px 1fr repeat(4, 80px);
    align-items: center;
    gap: 12px;
    transition: border-color 0.15s;
  }

  .run-row:hover { border-color: var(--accent); }

  .run-date {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .run-name {
    font-size: 13px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .run-metric { text-align: right; }

  .run-metric .val {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    color: var(--text);
  }

  .run-metric .lbl {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* AI section */
  .ai-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    margin-top: 28px;
  }

  .ai-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .ai-badge {
    background: var(--accent);
    color: #0d0f14;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 0.05em;
  }

  .ai-header h3 {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }

  .ai-body {
    font-size: 14px;
    line-height: 1.7;
    color: #b0b8c8;
  }

  .ai-body ul {
    margin-top: 12px;
    padding-left: 0;
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .ai-body li::before {
    content: '→';
    color: var(--accent);
    margin-right: 8px;
    font-family: 'Space Mono', monospace;
  }

  .ai-input-row {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  .ai-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  .ai-input:focus { border-color: var(--accent); }
  .ai-input::placeholder { color: var(--muted); }

  .ai-btn {
    background: var(--accent);
    color: #0d0f14;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s;
  }

  .ai-btn:hover { opacity: 0.85; }
  .ai-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .loading-dot {
    display: inline-block;
    animation: blink 1s infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Garmin · Running Log</h1>
    <p>最近 30 天跑步數據</p>
  </div>
  <div class="header-right" id="updated"></div>
</div>

<div class="stats" id="stats"></div>

<div class="charts">
  <div class="chart-card">
    <div class="chart-title">配速趨勢（分鐘/公里）</div>
    <div class="chart-wrap"><canvas id="paceChart"></canvas></div>
  </div>
  <div class="chart-card">
    <div class="chart-title">心率趨勢（bpm）</div>
    <div class="chart-wrap"><canvas id="hrChart"></canvas></div>
  </div>
</div>

<div class="section-title">每次跑步紀錄</div>
<div class="run-list" id="runList"></div>

<div class="ai-card">
  <div class="ai-header">
    <span class="ai-badge">AI</span>
    <h3>跑步分析與建議</h3>
  </div>
  <div class="ai-body" id="aiBody">
    <span style="color:var(--muted)">載入中，分析你的跑步數據...</span>
  </div>
  <div class="ai-input-row">
    <input class="ai-input" id="aiInput" type="text" placeholder="問我任何跑步問題，例如：我的步頻正常嗎？">
    <button class="ai-btn" id="aiBtn" onclick="askAI()">發問</button>
  </div>
</div>

<script>
// ── 真實數據（從 running_data.json 複製而來）──────────────────
const DATA = {
  "summary": {
    "total_runs": 9,
    "total_distance_km": 36.51,
    "total_duration_min": 254.5,
    "avg_distance_km": 4.06,
    "avg_hr": 139.9,
    "avg_cadence": 161.8
  },
  "runs": [
    {"date":"2026-06-10","name":"Daan District Running","distance_km":4.09,"duration_min":30.2,"pace":"7'22\"","avg_hr":123,"max_hr":133,"calories":281,"avg_cadence":170.6,"elevation_gain_m":4,"avg_stride_length_m":79.3},
    {"date":"2026-06-10","name":"Daan District Running","distance_km":1.81,"duration_min":15.1,"pace":"8'20\"","avg_hr":128,"max_hr":152,"calories":143,"avg_cadence":130.8,"elevation_gain_m":2,"avg_stride_length_m":92.3},
    {"date":"2026-06-08","name":"Wenshan District Running","distance_km":6.01,"duration_min":40.1,"pace":"6'40\"","avg_hr":139,"max_hr":154,"calories":424,"avg_cadence":180.1,"elevation_gain_m":12,"avg_stride_length_m":82.7},
    {"date":"2026-05-27","name":"Daan District Running","distance_km":1.91,"duration_min":11.9,"pace":"6'13\"","avg_hr":152,"max_hr":167,"calories":141,"avg_cadence":172.0,"elevation_gain_m":3,"avg_stride_length_m":93.0},
    {"date":"2026-05-25","name":"Wenshan District Running","distance_km":5.77,"duration_min":35.6,"pace":"6'10\"","avg_hr":152,"max_hr":169,"calories":412,"avg_cadence":177.6,"elevation_gain_m":11,"avg_stride_length_m":90.3},
    {"date":"2026-05-20","name":"Daan District Running","distance_km":2.62,"duration_min":26.2,"pace":"9'59\"","avg_hr":136,"max_hr":156,"calories":243,"avg_cadence":118.2,"elevation_gain_m":4,"avg_stride_length_m":84.4},
    {"date":"2026-05-20","name":"Daan District Running","distance_km":1.62,"duration_min":12.0,"pace":"7'25\"","avg_hr":139,"max_hr":156,"calories":129,"avg_cadence":157.1,"elevation_gain_m":2,"avg_stride_length_m":87.0},
    {"date":"2026-05-18","name":"Wenshan District Run Workout","distance_km":6.07,"duration_min":40.2,"pace":"6'36\"","avg_hr":142,"max_hr":157,"calories":426,"avg_cadence":177.5,"elevation_gain_m":10,"avg_stride_length_m":84.6},
    {"date":"2026-05-15","name":"Wenshan District Run Workout","distance_km":6.61,"duration_min":43.2,"pace":"6'32\"","avg_hr":148,"max_hr":167,"calories":475,"avg_cadence":172.7,"elevation_gain_m":21,"avg_stride_length_m":87.4}
  ]
};

// ── 渲染 Stats ────────────────────────────────────────────────
function renderStats() {
  const s = DATA.summary;
  const totalCal = DATA.runs.reduce((a,r) => a + (r.calories||0), 0);
  const statsEl = document.getElementById('stats');
  const items = [
    { label: '總距離', value: s.total_distance_km, unit: '公里', highlight: true },
    { label: '跑步次數', value: s.total_runs, unit: '次' },
    { label: '總時間', value: Math.round(s.total_duration_min), unit: '分鐘' },
    { label: '平均配速', value: avgPaceStr(), unit: 'min/km' },
    { label: '平均心率', value: s.avg_hr, unit: 'bpm' },
    { label: '總消耗熱量', value: totalCal, unit: 'kcal' },
  ];
  statsEl.innerHTML = items.map(i => `
    <div class="stat-card ${i.highlight ? 'highlight' : ''}">
      <div class="stat-label">${i.label}</div>
      <div class="stat-value">${i.value}</div>
      <div class="stat-unit">${i.unit}</div>
    </div>
  `).join('');
}

function avgPaceStr() {
  const totalDist = DATA.summary.total_distance_km;
  const totalMin = DATA.summary.total_duration_min;
  const secPerKm = (totalMin * 60) / totalDist;
  const m = Math.floor(secPerKm / 60);
  const s = Math.round(secPerKm % 60);
  return `${m}'${String(s).padStart(2,'0')}"`;
}

// ── 渲染圖表 ──────────────────────────────────────────────────
function paceToSec(paceStr) {
  const match = paceStr.match(/(\d+)'(\d+)/);
  if (!match) return 0;
  return parseInt(match[1]) * 60 + parseInt(match[2]);
}

function secToPaceStr(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.round(sec % 60);
  return `${m}'${String(s).padStart(2,'0')}"`;
}

function renderCharts() {
  const runs = [...DATA.runs].reverse();
  const labels = runs.map(r => r.date.slice(5));
  const paces = runs.map(r => paceToSec(r.pace));
  const hrs = runs.map(r => r.avg_hr);

  const chartDefaults = {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { display: false }, tooltip: { callbacks: {} } },
    scales: {
      x: { grid: { color: '#23272f' }, ticks: { color: '#6b7280', font: { size: 10, family: 'Space Mono' } } },
      y: { grid: { color: '#23272f' }, ticks: { color: '#6b7280', font: { size: 10 } } }
    }
  };

  // Pace chart (lower = better, so invert axis)
  new Chart(document.getElementById('paceChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: paces,
        borderColor: '#c8f135',
        backgroundColor: 'rgba(200,241,53,0.08)',
        borderWidth: 2,
        pointBackgroundColor: '#c8f135',
        pointRadius: 4,
        fill: true,
        tension: 0.3
      }]
    },
    options: {
      ...chartDefaults,
      scales: {
        ...chartDefaults.scales,
        y: {
          ...chartDefaults.scales.y,
          reverse: true,
          ticks: { ...chartDefaults.scales.y.ticks, callback: v => secToPaceStr(v) }
        }
      },
      plugins: {
        ...chartDefaults.plugins,
        tooltip: { callbacks: { label: ctx => secToPaceStr(ctx.raw) } }
      }
    }
  });

  // HR chart
  new Chart(document.getElementById('hrChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: hrs,
        borderColor: '#ff6b6b',
        backgroundColor: 'rgba(255,107,107,0.08)',
        borderWidth: 2,
        pointBackgroundColor: '#ff6b6b',
        pointRadius: 4,
        fill: true,
        tension: 0.3
      }]
    },
    options: {
      ...chartDefaults,
      plugins: {
        ...chartDefaults.plugins,
        tooltip: { callbacks: { label: ctx => `${ctx.raw} bpm` } }
      },
      scales: {
        ...chartDefaults.scales,
        y: { ...chartDefaults.scales.y, ticks: { ...chartDefaults.scales.y.ticks, callback: v => `${v}` } }
      }
    }
  });
}

// ── 渲染跑步列表 ──────────────────────────────────────────────
function renderList() {
  const el = document.getElementById('runList');
  el.innerHTML = DATA.runs.map(r => `
    <div class="run-row">
      <div class="run-date">${r.date}</div>
      <div class="run-name">${r.name}</div>
      <div class="run-metric"><div class="val">${r.distance_km}</div><div class="lbl">km</div></div>
      <div class="run-metric"><div class="val">${r.pace}</div><div class="lbl">配速</div></div>
      <div class="run-metric"><div class="val">${r.avg_hr}</div><div class="lbl">心率</div></div>
      <div class="run-metric"><div class="val">${Math.round(r.avg_cadence)}</div><div class="lbl">步頻</div></div>
    </div>
  `).join('');
}

// ── AI 分析 ───────────────────────────────────────────────────
const SYSTEM_PROMPT = `你是一位專業跑步教練，擅長分析 Garmin 數據並給出具體改善建議。
用繁體中文回覆，語氣親切專業。
以下是這位跑者最近的數據：
${JSON.stringify(DATA, null, 2)}

請根據數據給出具體觀察，不要說廢話。`;

let conversationHistory = [];

async function callClaude(userMessage) {
  conversationHistory.push({ role: "user", content: userMessage });

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1000,
      system: SYSTEM_PROMPT,
      messages: conversationHistory
    })
  });

  const data = await response.json();
  const reply = data.content?.find(b => b.type === "text")?.text || "無法取得回應";
  conversationHistory.push({ role: "assistant", content: reply });
  return reply;
}

function renderAIResponse(text) {
  // 把換行轉成列表項目
  const lines = text.split('\n').filter(l => l.trim());
  const html = lines.map(line => {
    if (line.startsWith('•') || line.startsWith('-') || line.startsWith('*')) {
      return `<li>${line.replace(/^[•\-\*]\s*/, '')}</li>`;
    }
    return `<p>${line}</p>`;
  });

  const hasLi = html.some(h => h.startsWith('<li>'));
  if (hasLi) {
    return html.map(h => h.startsWith('<li>') ? h : h).join('').replace(/(<li>.*<\/li>)/gs, '<ul>$&</ul>');
  }
  return html.join('');
}

async function askAI(initialPrompt = null) {
  const input = document.getElementById('aiInput');
  const btn = document.getElementById('aiBtn');
  const body = document.getElementById('aiBody');

  const message = initialPrompt || input.value.trim();
  if (!message) return;

  input.value = '';
  btn.disabled = true;
  body.innerHTML = `<span style="color:var(--muted)">分析中 <span class="loading-dot">▌</span></span>`;

  try {
    const reply = await callClaude(message);
    body.innerHTML = renderAIResponse(reply);
  } catch (e) {
    body.innerHTML = `<span style="color:var(--red)">連線失敗，請確認網路狀況</span>`;
  }

  btn.disabled = false;
}

// ── 初始化 ────────────────────────────────────────────────────
document.getElementById('updated').textContent = `更新時間\n${new Date().toLocaleDateString('zh-TW')}`;

document.getElementById('aiInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') askAI();
});

renderStats();
renderCharts();
renderList();

// 自動產生初始 AI 分析
askAI("請分析我最近的跑步數據，找出 2-3 個具體問題，並給出改善建議。");
</script>
</body>
</html>

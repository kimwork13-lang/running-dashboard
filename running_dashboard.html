<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>跑步紀錄</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --border: #23272f;
    --accent: #c8f135;
    --accent-dim: rgba(200,241,53,0.1);
    --text: #e8eaf0;
    --muted: #6b7280;
    --red: #ff6b6b;
    --blue: #60a5fa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 32px 24px;
  }

  .header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 40px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
  }

  .header-left h1 {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 400;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .header-left p {
    font-size: 28px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.1;
  }

  .header-right {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: right;
  }

  /* Stats row */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
  }

  .stat-card.highlight {
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  .stat-value {
    font-family: 'Space Mono', monospace;
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }

  .stat-card.highlight .stat-value { color: var(--accent); }

  .stat-unit {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* Charts row */
  .charts {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 28px;
  }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
  }

  .chart-title {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 16px;
  }

  .chart-wrap { position: relative; height: 180px; }

  /* Run list */
  .section-title {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 12px;
  }

  .run-list { display: flex; flex-direction: column; gap: 8px; }

  .run-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    display: grid;
    grid-template-columns: 90px 1fr repeat(4, 80px) 24px;
    align-items: center;
    gap: 12px;
    transition: border-color 0.15s;
    cursor: pointer;
  }

  .run-row:hover { border-color: var(--accent); }

  .run-toggle {
    text-align: right;
    color: var(--muted);
    font-size: 12px;
    transition: transform 0.2s;
  }

  .run-item.open .run-toggle { transform: rotate(180deg); color: var(--accent); }

  .run-detail {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 10px 10px;
    margin-top: -8px;
    padding: 20px;
  }

  .run-item.open .run-detail { display: block; }
  .run-item.open .run-row { border-radius: 10px 10px 0 0; border-bottom: none; }

  .run-detail .metrics-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    margin-bottom: 18px;
  }

  .run-detail .metric-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    text-align: center;
  }

  .run-detail .metric-box .label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }

  .run-detail .metric-box .value {
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
  }

  .run-detail .overall-rating {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    background: var(--accent-dim);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 16px;
  }

  .run-detail .analysis-section { margin-bottom: 14px; }

  .run-detail .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }

  .run-detail .section-text {
    font-size: 13px;
    line-height: 1.7;
    color: #b0b8c8;
  }

  .run-detail .suggestions-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .run-detail .suggestions-list li {
    font-size: 13px;
    line-height: 1.6;
    color: #b0b8c8;
  }

  .run-detail .suggestions-list li::before {
    content: '→';
    color: var(--accent);
    margin-right: 8px;
    font-family: 'Space Mono', monospace;
  }

  .run-detail .no-analysis {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    padding: 12px;
  }

  @media (max-width: 700px) {
    .run-detail .metrics-grid { grid-template-columns: repeat(2, 1fr); }
  }

  .run-date {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .run-name {
    font-size: 13px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .run-metric { text-align: right; }

  .run-metric .val {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    color: var(--text);
  }

  .run-metric .lbl {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* AI section */
  .ai-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    margin-top: 28px;
  }

  .ai-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .ai-badge {
    background: var(--accent);
    color: #0d0f14;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 0.05em;
  }

  .ai-header h3 {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }

  .ai-body {
    font-size: 14px;
    line-height: 1.7;
    color: #b0b8c8;
  }

  .ai-body ul {
    margin-top: 12px;
    padding-left: 0;
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .ai-body li::before {
    content: '→';
    color: var(--accent);
    margin-right: 8px;
    font-family: 'Space Mono', monospace;
  }

  .ai-input-row {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  .ai-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  .ai-input:focus { border-color: var(--accent); }
  .ai-input::placeholder { color: var(--muted); }

  .ai-btn {
    background: var(--accent);
    color: #0d0f14;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s;
  }

  .ai-btn:hover { opacity: 0.85; }
  .ai-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .loading-dot {
    display: inline-block;
    animation: blink 1s infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Garmin · Running Log</h1>
    <p>最近 30 天跑步數據</p>
  </div>
  <div class="header-right" id="updated"></div>
</div>

<div class="stats" id="stats"></div>

<div class="charts">
  <div class="chart-card">
    <div class="chart-title">配速趨勢（分鐘/公里）</div>
    <div class="chart-wrap"><canvas id="paceChart"></canvas></div>
  </div>
  <div class="chart-card">
    <div class="chart-title">心率趨勢（bpm）</div>
    <div class="chart-wrap"><canvas id="hrChart"></canvas></div>
  </div>
</div>

<div class="section-title">每次跑步紀錄</div>
<div class="run-list" id="runList"></div>

<div class="ai-card">
  <div class="ai-header">
    <span class="ai-badge">AI</span>
    <h3>AI 分析</h3>
  </div>
  <div class="ai-body">
    <span style="color:var(--muted)">點擊上方任一筆跑步紀錄，展開查看 AI 對該次跑步的步頻、效率分析與改善建議。</span>
  </div>
</div>

<script>
// ── 動態載入跑步數據 ─────────────────────────────────────────
let DATA = { summary: {}, runs: [] };

async function loadRunningData() {
  try {
    const res = await fetch('running_data.json?t=' + Date.now());
    if (res.ok) {
      DATA = await res.json();
    }
  } catch (e) {
    console.error('無法載入跑步數據', e);
  }
}

// ── 渲染 Stats ────────────────────────────────────────────────
function renderStats() {
  const s = DATA.summary;
  const totalCal = DATA.runs.reduce((a,r) => a + (r.calories||0), 0);
  const statsEl = document.getElementById('stats');
  const items = [
    { label: '總距離', value: s.total_distance_km, unit: '公里', highlight: true },
    { label: '跑步次數', value: s.total_runs, unit: '次' },
    { label: '總時間', value: Math.round(s.total_duration_min), unit: '分鐘' },
    { label: '平均配速', value: avgPaceStr(), unit: 'min/km' },
    { label: '平均心率', value: s.avg_hr, unit: 'bpm' },
    { label: '總消耗熱量', value: totalCal, unit: 'kcal' },
  ];
  statsEl.innerHTML = items.map(i => `
    <div class="stat-card ${i.highlight ? 'highlight' : ''}">
      <div class="stat-label">${i.label}</div>
      <div class="stat-value">${i.value}</div>
      <div class="stat-unit">${i.unit}</div>
    </div>
  `).join('');
}

function avgPaceStr() {
  const totalDist = DATA.summary.total_distance_km;
  const totalMin = DATA.summary.total_duration_min;
  const secPerKm = (totalMin * 60) / totalDist;
  const m = Math.floor(secPerKm / 60);
  const s = Math.round(secPerKm % 60);
  return `${m}'${String(s).padStart(2,'0')}"`;
}

// ── 渲染圖表 ──────────────────────────────────────────────────
function paceToSec(paceStr) {
  const match = paceStr.match(/(\d+)'(\d+)/);
  if (!match) return 0;
  return parseInt(match[1]) * 60 + parseInt(match[2]);
}

function secToPaceStr(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.round(sec % 60);
  return `${m}'${String(s).padStart(2,'0')}"`;
}

function renderCharts() {
  const runs = [...DATA.runs].reverse();
  const labels = runs.map(r => r.date.slice(5));
  const paces = runs.map(r => paceToSec(r.pace));
  const hrs = runs.map(r => r.avg_hr);

  const chartDefaults = {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { display: false }, tooltip: { callbacks: {} } },
    scales: {
      x: { grid: { color: '#23272f' }, ticks: { color: '#6b7280', font: { size: 10, family: 'Space Mono' } } },
      y: { grid: { color: '#23272f' }, ticks: { color: '#6b7280', font: { size: 10 } } }
    }
  };

  // Pace chart (lower = better, so invert axis)
  new Chart(document.getElementById('paceChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: paces,
        borderColor: '#c8f135',
        backgroundColor: 'rgba(200,241,53,0.08)',
        borderWidth: 2,
        pointBackgroundColor: '#c8f135',
        pointRadius: 4,
        fill: true,
        tension: 0.3
      }]
    },
    options: {
      ...chartDefaults,
      scales: {
        ...chartDefaults.scales,
        y: {
          ...chartDefaults.scales.y,
          reverse: true,
          ticks: { ...chartDefaults.scales.y.ticks, callback: v => secToPaceStr(v) }
        }
      },
      plugins: {
        ...chartDefaults.plugins,
        tooltip: { callbacks: { label: ctx => secToPaceStr(ctx.raw) } }
      }
    }
  });

  // HR chart
  new Chart(document.getElementById('hrChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: hrs,
        borderColor: '#ff6b6b',
        backgroundColor: 'rgba(255,107,107,0.08)',
        borderWidth: 2,
        pointBackgroundColor: '#ff6b6b',
        pointRadius: 4,
        fill: true,
        tension: 0.3
      }]
    },
    options: {
      ...chartDefaults,
      plugins: {
        ...chartDefaults.plugins,
        tooltip: { callbacks: { label: ctx => `${ctx.raw} bpm` } }
      },
      scales: {
        ...chartDefaults.scales,
        y: { ...chartDefaults.scales.y, ticks: { ...chartDefaults.scales.y.ticks, callback: v => `${v}` } }
      }
    }
  });
}

// ── 渲染跑步列表 ──────────────────────────────────────────────
let ANALYSIS = { analyses: [] };

async function loadAnalysis() {
  try {
    const res = await fetch('analysis.json?t=' + Date.now());
    if (res.ok) {
      ANALYSIS = await res.json();
    }
  } catch (e) {
    console.error('無法載入分析數據', e);
  }
}

function findAnalysis(activityId) {
  return (ANALYSIS.analyses || []).find(a => a.activity_id === activityId);
}

function metricBox(label, value) {
  return `<div class="metric-box"><div class="label">${label}</div><div class="value">${value}</div></div>`;
}

function renderAnalysisDetail(item) {
  const r = item.run;
  const a = item.analysis;

  if (a.raw_text) {
    return `<div class="analysis-section"><div class="section-text">${a.raw_text}</div></div>`;
  }

  return `
    <div class="overall-rating">${a.overall_rating || ''}</div>
    <div class="analysis-section">
      <div class="section-label">步頻分析</div>
      <div class="section-text">${a.cadence_analysis || ''}</div>
    </div>
    <div class="analysis-section">
      <div class="section-label">效率分析</div>
      <div class="section-text">${a.efficiency_analysis || ''}</div>
    </div>
    <div class="analysis-section">
      <div class="section-label">趨勢對比</div>
      <div class="section-text">${a.comparison || ''}</div>
    </div>
    <div class="analysis-section">
      <div class="section-label">改善建議</div>
      <ul class="suggestions-list">
        ${(a.suggestions || []).map(s => `<li>${s}</li>`).join('')}
      </ul>
    </div>`;
}

function renderRunDetail(r) {
  const metricsHtml = `
    <div class="metrics-grid">
      ${metricBox('距離', r.distance_km + ' km')}
      ${metricBox('時間', r.duration_min + ' 分')}
      ${metricBox('配速', r.pace)}
      ${metricBox('心率', r.avg_hr + ' bpm')}
      ${metricBox('步頻', Math.round(r.avg_cadence) + ' spm')}
    </div>`;

  const item = findAnalysis(r.activity_id);

  if (!item) {
    return metricsHtml + `<div class="no-analysis">這筆紀錄還沒有 AI 分析</div>`;
  }

  return metricsHtml + renderAnalysisDetail(item);
}

function renderList() {
  const el = document.getElementById('runList');
  el.innerHTML = DATA.runs.map((r, i) => `
    <div class="run-item" id="run-item-${i}">
      <div class="run-row" onclick="toggleRun(${i})">
        <div class="run-date">${r.date}</div>
        <div class="run-name">${r.name}</div>
        <div class="run-metric"><div class="val">${r.distance_km}</div><div class="lbl">km</div></div>
        <div class="run-metric"><div class="val">${r.pace}</div><div class="lbl">配速</div></div>
        <div class="run-metric"><div class="val">${r.avg_hr}</div><div class="lbl">心率</div></div>
        <div class="run-metric"><div class="val">${Math.round(r.avg_cadence)}</div><div class="lbl">步頻</div></div>
        <div class="run-toggle">▾</div>
      </div>
      <div class="run-detail" id="run-detail-${i}"></div>
    </div>
  `).join('');
}

function toggleRun(i) {
  const item = document.getElementById(`run-item-${i}`);
  const detail = document.getElementById(`run-detail-${i}`);
  const isOpen = item.classList.contains('open');

  if (!isOpen && !detail.dataset.loaded) {
    detail.innerHTML = renderRunDetail(DATA.runs[i]);
    detail.dataset.loaded = 'true';
  }

  item.classList.toggle('open');
}

// ── 初始化 ────────────────────────────────────────────────────
document.getElementById('updated').textContent = `更新時間\n${new Date().toLocaleDateString('zh-TW')}`;

async function init() {
  await loadRunningData();
  await loadAnalysis();
  renderStats();
  renderCharts();
  renderList();
}

init();
</script>
</body>
</html>
